# Netlify configuration

# --- Security headers (για όλες τις σελίδες) ---
# Χωρίς CSP προς το παρόν: θα απαιτούσε προσεκτικό allowlisting (Umami, inline
# styles του Astro) και το όφελος σε static site είναι μικρό σε σχέση με το ρίσκο.

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Strict-Transport-Security = "max-age=31536000"

#
# 301 redirects για τη μετάβαση από το παλιό brand/site (bitautomations.gr)
# στο smarthomepro.gr. Προϋπόθεση: το bitautomations.gr (και το www) έχουν
# προστεθεί ως domain aliases στο ίδιο Netlify site (Domain management →
# Add domain alias) και τα DNS web records του παλιού domain δείχνουν στο Netlify.
#
# Mapping παλιών σελίδων → νέων (1-προς-1 όπου υπάρχει αντίστοιχη σελίδα,
# όπως συνιστά το εργαλείο Change of Address του Search Console):
#   /smart-home/  → /ypiresies/meleti-egkatastasi-knx/
#   /services/    → /ypiresies/meleti-egkatastasi-knx/
#   /projects/    → /projects/
#   /about/       → αρχική (ενότητα επικοινωνίας)
#   οτιδήποτε άλλο → αρχική

# --- bitautomations.gr (apex) ---

[[redirects]]
  from = "https://bitautomations.gr/smart-home/*"
  to = "https://smarthomepro.gr/ypiresies/meleti-egkatastasi-knx/"
  status = 301
  force = true

[[redirects]]
  from = "https://bitautomations.gr/services/*"
  to = "https://smarthomepro.gr/ypiresies/meleti-egkatastasi-knx/"
  status = 301
  force = true

[[redirects]]
  from = "https://bitautomations.gr/projects/*"
  to = "https://smarthomepro.gr/projects/"
  status = 301
  force = true

[[redirects]]
  from = "https://bitautomations.gr/about/*"
  to = "https://smarthomepro.gr/#contact"
  status = 301
  force = true

[[redirects]]
  from = "https://bitautomations.gr/*"
  to = "https://smarthomepro.gr/"
  status = 301
  force = true

# --- www.bitautomations.gr ---

[[redirects]]
  from = "https://www.bitautomations.gr/smart-home/*"
  to = "https://smarthomepro.gr/ypiresies/meleti-egkatastasi-knx/"
  status = 301
  force = true

[[redirects]]
  from = "https://www.bitautomations.gr/services/*"
  to = "https://smarthomepro.gr/ypiresies/meleti-egkatastasi-knx/"
  status = 301
  force = true

[[redirects]]
  from = "https://www.bitautomations.gr/projects/*"
  to = "https://smarthomepro.gr/projects/"
  status = 301
  force = true

[[redirects]]
  from = "https://www.bitautomations.gr/about/*"
  to = "https://smarthomepro.gr/#contact"
  status = 301
  force = true

[[redirects]]
  from = "https://www.bitautomations.gr/*"
  to = "https://smarthomepro.gr/"
  status = 301
  force = true

# --- http εκδοχές (το Netlify κάνει ήδη http→https, αλλά για σιγουριά) ---

[[redirects]]
  from = "http://bitautomations.gr/*"
  to = "https://smarthomepro.gr/"
  status = 301
  force = true

[[redirects]]
  from = "http://www.bitautomations.gr/*"
  to = "https://smarthomepro.gr/"
  status = 301
  force = true
